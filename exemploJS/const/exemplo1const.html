<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo Const</h1>
    <p>O nome so sistema e fixo (const)</p>

    <label for="">Digite seu nome:</label>
    <input type="text" name="" id="nome" placeholder="Digite seu nome aqui">

    <button onclick="mostar()">Mostar</button>

    <p id="resultado"></p>

    <script>
        const sistema = "Sistema Escolar"
        function mostar() {
            let nome = document.getElementById("nome").value

            document.getElementById("resultado").innerHTML = "Bem-vindo " + nome +  " ao"  + sistema
        }
    </script>
</body>
</html>
